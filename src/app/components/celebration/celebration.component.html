<div class="celebration-overlay" (click)="onOverlayClick()">
  <!-- Confetti particles -->
  <div class="confetti-container">
    <div *ngFor="let p of confettiParticles"
         class="confetti-particle"
         [style.left.%]="p.left"
         [style.animation-delay.s]="p.delay"
         [style.background]="p.color"
         [style.width.px]="p.size"
         [style.height.px]="p.size"
         [style.transform]="'rotate(' + p.rotation + 'deg)'">
    </div>
  </div>

  <!-- Celebration card -->
  <div class="celebration-card" (click)="$event.stopPropagation()">
    <div class="celebration-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#b68f5e"/>
            <stop offset="100%" stop-color="#8d6e47"/>
          </linearGradient>
        </defs>
        <circle cx="12" cy="12" r="10" stroke="url(#checkGrad)"/>
        <path d="m9 12 2 2 4-4" stroke="url(#checkGrad)"/>
      </svg>
    </div>
    <div class="celebration-title">{{ confirmText }}</div>
    <div class="celebration-progress">
      <div class="celebration-progress-track">
        <div class="celebration-progress-fill" [style.width.%]="progressPercent"></div>
      </div>
      <div class="celebration-progress-label">
        <span class="progress-percent">{{ progressPercent }}% del día</span>
        <span class="progress-kcal">~{{ totalCalories }} kcal</span>
      </div>
    </div>
    <div class="celebration-message">{{ message }}</div>
    <div class="celebration-meal-count">
      {{ getMealCountText() }}
    </div>
    <button class="continue-btn" (click)="onContinueClick()">
      <div class="continue-fill" [style.width.%]="countdownProgress"></div>
      <span class="continue-text">Continuar{{ countdown > 0 ? ' ' + countdown : '' }}</span>
    </button>
  </div>
</div>
